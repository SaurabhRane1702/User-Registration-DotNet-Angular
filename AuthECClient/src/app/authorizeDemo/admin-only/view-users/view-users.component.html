<div class="mb-3" style="text-align: end;">
    <a role="button" routerLink="/dashboard" class="btn btn-secondary">
        Go Back
    </a>
</div>

<table *ngIf="users!.length > 0" class="table">
    <thead class="thead-dark">
        <tr>
            <th>Full Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Library ID</th>
            <th>Roles</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let item of users">
            <td>{{ item.fullName }}</td>
            <td>{{ item.email }}</td>
            <td>{{ item.gender || 'Not Specified'}}</td>
            <td>{{ item.libraryId || 0 }}</td>
            <td>{{ item.role }}</td>
            <td>
                <a role="button"
                   title="Edit User Details"
                   class="btn btn-secondary">
                    Edit User
                </a>
            </td>
        </tr>
    </tbody>
</table>

<table *ngIf="!users || users.length == 0" class="table">
    <thead class="thead-dark">
        <tr>
            <th>User Number</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Library ID</th>
            <th>Roles</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td colspan="7" class="text-center">No Users to Display right now.</td>
        </tr>
    </tbody>
</table>
